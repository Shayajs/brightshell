server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    # Résolution DNS dynamique (évite 502 après docker compose up sur brightshell_app).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_fpm brightshell_app:9000;

    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Iframe notification bridge (settings.*) : autoriser les autres sous-domaines portails.
    location = /notifications/bridge {
        try_files $uri /index.php?$query_string;
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.brightshell.fr https://*.brightshell.test http://*.brightshell.test http://*.localhost https://*.localhost" always;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass $php_fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# Copier ce fichier vers docker-compose-shaya.dev.yaml (gitignored)
# Usage: docker compose -f docker-compose-shaya.dev.yaml up -d
#
# Prérequis: docker network create dev_gateway_net
# Dans NPM: brightshell.test → http://brightshell_dev_nginx:80

name: brightshell-dev

services:
  brightshell_dev_php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brightshell_dev_php
    user: "1000:1000"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - brightshell_dev_internal
    depends_on:
      - brightshell_dev_db

  brightshell_dev_nginx:
    image: nginx:alpine
    container_name: brightshell_dev_nginx
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/brightshell-dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - brightshell_dev_internal
      - dev_gateway_net
    depends_on:
      - brightshell_dev_php

  brightshell_dev_db:
    image: mysql:8.0
    container_name: brightshell_dev_db
    environment:
      MYSQL_DATABASE: brightshell
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-brightshell_secret}"
    volumes:
      - brightshell_dev_db_data:/var/lib/mysql
    networks:
      - brightshell_dev_internal

networks:
  brightshell_dev_internal:
    driver: bridge
  dev_gateway_net:
    external: true

volumes:
  brightshell_dev_db_data:
